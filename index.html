<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Registration Form</title>
  <link rel="stylesheet" href="app.css" />
</head>

<body>
  <main class="container">
    <h1>Race Registration Form!</h1>

    <form action="#" method="post">
      <div class="form-group">
        <label for="first">First Name</label>
        <input type="text" placeholder="First" name="first" id="first" required />
      </div>

      <div class="form-group">
        <label for="last">Last Name</label>
        <input type="text" placeholder="Last" name="last" id="last" required />
      </div>

      <fieldset>
        <legend>Select a Race:</legend>

        <div class="radio-group">
          <input type="radio" name="race" id="funrun" value="funrun" required />
          <label for="funrun">Fun Run 5k</label>
        </div>

        <div class="radio-group">
          <input type="radio" name="race" id="half" value="half" />
          <label for="half">Half Marathon</label>
        </div>

        <div class="radio-group">
          <input type="radio" name="race" id="full" value="full" />
          <label for="full">Full Marathon</label>
        </div>
      </fieldset>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" placeholder="email@abc.com" name="email" id="email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" placeholder="password" name="password" id="password" required />
      </div>

      <div class="form-group">
        <label for="division">Select an Age Group</label>
        <select name="division" id="division" required>
          <option value="kids">Under 18</option>
          <option value="youth">18-30</option>
          <option value="adults">30-50</option>
          <option value="seniors">50+</option>
        </select>
      </div>

      <button type="submit">Register</button>
    </form>
  </main>
</body>
</html>
